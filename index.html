<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DailyOS">
<meta name="theme-color" content="#0f0f0f">
<title>Lakshman · Daily OS</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf8f4;--bg2:#f3efe8;--card:#fff;--ink:#1a1714;--ink2:#5c564d;--ink3:#9a9286;--gold:#b8860b;--gold-l:#d4a843;--gold-bg:#fdf6e3;--green:#1a6b4a;--green-bg:#e8f5ef;--orange:#c66a1d;--orange-bg:#fef0e3;--red:#b33a3a;--indigo:#4a4a8a;--indigo-bg:#ededf7;--border:#e6e1d9;--border2:#d4cfc5;--shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.03);--radius:10px;--rlg:14px;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}
@media(prefers-color-scheme:dark){:root{--bg:#0f0f0f;--bg2:#1a1a1a;--card:#222220;--ink:#ede8df;--ink2:#a09a8f;--ink3:#6b665e;--gold:#d4a843;--gold-l:#e8c97a;--gold-bg:#2a2210;--green:#3da87a;--green-bg:#0f2a1e;--orange:#e8943a;--orange-bg:#2a1a08;--red:#e05555;--indigo:#8888cc;--indigo-bg:#1a1a2e;--border:#333330;--border2:#444440;--shadow:0 1px 3px rgba(0,0,0,.2)}}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--ink);height:100%;overflow:hidden;display:flex;flex-direction:column}
input,textarea,button,select{font-family:inherit}textarea{resize:vertical}button{cursor:pointer}

/* Header */
.hdr{background:#0f0f0f;padding:12px 16px;padding-top:calc(12px + var(--st));display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--gold);flex-shrink:0;z-index:100}
.hdr h1{font-family:'Crimson Pro',serif;color:var(--gold-l);font-size:1.15rem;font-weight:600}
.hdr .sub{color:#6b665e;font-size:.55rem;letter-spacing:2px;text-transform:uppercase}
.hdr-r{display:flex;align-items:center;gap:8px}
.badge{background:var(--gold);color:#0f0f0f;padding:3px 8px;border-radius:12px;font-size:.65rem;font-weight:700}
.syncb{background:0;border:1px solid #444;color:#a09a8f;padding:4px 8px;border-radius:6px;font-size:.65rem}

/* Date nav */
.dnav{display:flex;align-items:center;justify-content:center;gap:12px;padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.dnav button{background:0;border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:.85rem;color:var(--ink2)}
.dnav button:disabled{opacity:.3}
.dnav .dc{text-align:center;min-width:150px}
.dname{font-weight:600;font-size:.88rem}.ddate{font-size:.68rem;color:var(--ink3);font-family:'JetBrains Mono',monospace}
.todayb{background:var(--gold)!important;color:#0f0f0f!important;border:none!important;font-size:.68rem!important;font-weight:600;padding:3px 10px!important}

/* Tabs */
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.tab{flex:1;padding:8px 4px;background:0;border:none;font-size:.65rem;font-weight:400;color:var(--ink3);border-bottom:2.5px solid transparent;white-space:nowrap}
.tab.on{color:var(--gold);font-weight:600;border-bottom-color:var(--gold)}
.tab .ti{display:block;font-size:1rem;margin-bottom:1px}

/* Scroll */
.scr{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:14px 14px calc(14px + var(--sb))}
.scr>*:last-child{margin-bottom:16px}

/* Card */
.cd{background:var(--card);border:1px solid var(--border);border-radius:var(--rlg);padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
.ch{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:1.6px;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}

/* Score */
.sc-sec{display:flex;gap:14px;align-items:center;padding:14px;background:var(--card);border:1px solid var(--border);border-radius:var(--rlg);margin-bottom:12px;box-shadow:var(--shadow)}
.sc-info{flex:1;min-width:0}
.sc-info .lb{font-size:.65rem;color:var(--ink3);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.sc-info .nu{font-size:.78rem;line-height:1.5}.sc-info .cp{font-size:.65rem;color:var(--ink3);font-family:'JetBrains Mono',monospace;margin-top:4px}

/* Mood */
.mrow{display:flex;gap:8px;margin-bottom:12px}
.mcd{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:8px;text-align:center}
.mcd .lb{font-size:.58rem;color:var(--ink3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.mb{background:0;border:none;font-size:1.1rem;padding:2px;opacity:.25;transition:all .15s}.mb.on{opacity:1;transform:scale(1.15)}

/* Priority */
.pri{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;font-size:.82rem;background:var(--bg);color:var(--ink);margin-bottom:5px}
.pri:focus{outline:none;border-color:var(--gold)}.pri.fl{background:var(--green-bg);border-color:var(--green)}

/* Routine item (simple check) */
.sec{margin-bottom:12px}
.sec-h{font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;padding-left:4px;display:flex;align-items:center;gap:7px}
.sec-h .cnt{font-weight:400;color:var(--ink3)}
.ritem{display:flex;align-items:center;gap:9px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:4px;border-left:3.5px solid var(--border2);cursor:pointer;-webkit-user-select:none;user-select:none;min-height:44px}
.ritem:active{transform:scale(.985)}
.ritem.ok{border-left-color:var(--green);background:var(--green-bg)}
.ritem.cat-m{border-left-color:var(--orange)}.ritem.cat-m.ok{border-left-color:var(--green)}
.ritem.cat-e{border-left-color:var(--indigo)}.ritem.cat-e.ok{border-left-color:var(--green)}
.ritem .ico{font-size:1.15rem;flex-shrink:0;opacity:.5}.ritem.ok .ico{opacity:1}
.ritem .body{flex:1;min-width:0}
.ritem .nm{font-size:.82rem;font-weight:500}.ritem.ok .nm{color:var(--green);text-decoration:line-through}
.ritem .meta{font-size:.62rem;color:var(--ink3);font-family:'JetBrains Mono',monospace;margin-top:1px}
.chk{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.65rem;color:#fff;transition:all .15s}
.ritem.ok .chk{background:var(--green);border-color:var(--green)}

/* ═══ PLAYBOOK ACTION (checkable + optional notes) ═══ */
.pba{background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:5px;border-left:3.5px solid var(--gold);overflow:hidden}
.pba.ok{border-left-color:var(--green);background:var(--green-bg)}
.pba-row{display:flex;align-items:center;gap:9px;padding:10px 12px;cursor:pointer;-webkit-user-select:none;user-select:none;min-height:46px}
.pba-row:active{transform:scale(.985)}
.pba .ico{font-size:1.15rem;flex-shrink:0;opacity:.5}.pba.ok .ico{opacity:1}
.pba .body{flex:1;min-width:0}
.pba .nm{font-size:.82rem;font-weight:500}.pba.ok .nm{color:var(--green);text-decoration:line-through}
.pba .meta{font-size:.62rem;color:var(--ink3);font-family:'JetBrains Mono',monospace;margin-top:1px}
.pba .note-wrap{padding:0 12px 10px 43px}
.pba .note{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:.78rem;background:var(--bg);color:var(--ink);font-family:'Outfit',sans-serif}
.pba .note:focus{outline:none;border-color:var(--gold)}
.pba .note::placeholder{color:var(--ink3);font-style:italic;font-size:.74rem}

/* Habits */
.hcw{display:flex;flex-wrap:wrap;gap:6px}
.hc{padding:6px 12px;border-radius:18px;border:1.5px solid var(--border);background:var(--card);font-size:.74rem;-webkit-user-select:none;user-select:none;min-height:36px;display:inline-flex;align-items:center}
.hc:active{transform:scale(.95)}.hc.on{background:var(--green);border-color:var(--green);color:#fff}
.hc .pts{font-size:.58rem;opacity:.6;margin-left:3px}

/* Culture */
.cpill{display:inline-flex;align-items:center;padding:5px 10px;border-radius:14px;border:1px solid var(--border);font-size:.7rem;margin:2px;min-height:32px}
.cpill.ok{background:var(--green);border-color:var(--green);color:#fff}

/* Journal */
.ja{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:.82rem;line-height:1.7;background:var(--bg);color:var(--ink);font-family:'Crimson Pro',serif;min-height:72px}
.ja:focus{outline:none;border-color:var(--gold)}

/* LeaderLog prompt */
.llp{background:linear-gradient(135deg,#1a1208,#2a2018);border:1px solid #444;border-radius:var(--rlg);padding:14px;margin-bottom:12px}
.llp-lb{font-size:.6rem;color:var(--gold);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px}
.llp-tx{font-family:'Crimson Pro',serif;color:#e8e0d4;font-size:.86rem;line-height:1.6;font-style:italic}

/* Hat log in journal */
.hat-log{display:flex;gap:8px;margin-bottom:8px}
.hat-entry{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center}
.hat-entry .hi{font-size:1.1rem;margin-bottom:2px}
.hat-entry .hl{font-size:.58rem;font-weight:600;color:var(--ink2);margin-bottom:4px}
.hat-entry .ht{font-size:.5rem;color:var(--ink3)}
.hat-btns{display:flex;justify-content:center;gap:4px;margin-top:4px}
.hat-btns button{background:var(--card);border:1px solid var(--border);border-radius:5px;width:26px;height:26px;font-size:.75rem;color:var(--ink2);display:flex;align-items:center;justify-content:center}
.hat-btns button:active{background:var(--gold-bg)}
.hat-val{font-size:.95rem;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--ink);margin:4px 0 2px}

/* Hat history table */
.hat-hist{width:100%;border-collapse:collapse;font-size:.72rem;margin-top:8px}
.hat-hist th{text-align:left;padding:6px 8px;border-bottom:2px solid var(--border);color:var(--ink3);font-weight:500;font-size:.6rem;text-transform:uppercase;letter-spacing:1px}
.hat-hist td{padding:5px 8px;border-bottom:1px solid var(--border)}
.hat-hist .day-col{font-weight:500;color:var(--ink)}.hat-hist .num{font-family:'JetBrains Mono',monospace;text-align:center}
.hat-hist .pct{font-size:.6rem;color:var(--ink3)}
.hat-hist tr.today-row{background:var(--gold-bg)}
.hat-bar-mini{height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;margin-top:2px}
.hat-bar-fill{height:100%;border-radius:2px}

/* Tasks */
.tadd{display:flex;gap:7px;margin-bottom:10px}
.tinp{flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:.82rem;background:var(--bg);color:var(--ink);min-height:40px}
.tinp:focus{outline:none;border-color:var(--gold)}
.abtn{background:var(--gold);color:#0f0f0f;border:none;border-radius:8px;padding:8px 14px;font-weight:600;font-size:.8rem;min-height:40px}
.frow{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.fbtn{padding:5px 12px;border-radius:14px;border:1px solid var(--border);background:transparent;font-size:.7rem;color:var(--ink2);min-height:32px}
.fbtn.on{background:var(--gold);border-color:var(--gold);color:#0f0f0f;font-weight:600}
.cbtn{margin-left:auto;padding:5px 10px;border-radius:14px;border:1px solid var(--border);background:transparent;font-size:.65rem;color:var(--ink3);min-height:32px}
.titem{display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:4px;min-height:44px}
.tchk{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);background:0;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.6rem;color:#fff;min-width:22px}
.tchk.ok{background:var(--green);border-color:var(--green)}
.ttxt{flex:1;font-size:.82rem}.ttxt.ok{text-decoration:line-through;color:var(--ink3)}
.tcat{font-size:.55rem;color:var(--ink3);text-transform:uppercase;padding:2px 6px;background:var(--bg2);border-radius:6px}
.tdel{background:0;border:none;color:var(--red);font-size:.72rem;opacity:.4;padding:4px;min-width:24px;min-height:24px}
.tstat{display:flex;justify-content:space-around;padding:10px;background:var(--bg2);border-radius:8px;margin-top:10px;font-size:.7rem;color:var(--ink2)}

/* Insights */
.nbox{background:linear-gradient(135deg,#0f0f0f,#1a1a18);border-radius:var(--rlg);padding:16px;margin-bottom:12px}
.ni{color:#e8e0d4;font-size:.78rem;line-height:1.55;margin-bottom:8px;padding-left:9px;border-left:2px solid var(--gold)}.ni:last-child{margin-bottom:0}
.tbr{display:flex;align-items:flex-end;gap:5px;height:90px;padding-bottom:16px}
.tcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.tv{font-size:.58rem;color:var(--ink3);font-family:'JetBrains Mono',monospace}
.tbar{width:100%;max-width:28px;border-radius:3px 3px 0 0;min-height:3px;transition:height .5s}
.tday{font-size:.55rem;color:var(--ink3)}.tday.ty{color:var(--gold);font-weight:700}
.prow{margin-bottom:8px}.plb{display:flex;justify-content:space-between;font-size:.74rem;margin-bottom:3px}
.plb span:last-child{color:var(--ink3);font-family:'JetBrains Mono',monospace;font-size:.68rem}
.ptrk{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}.pfill{height:100%;border-radius:3px;transition:width .5s}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.scd{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center}
.scd .si{font-size:1.2rem;margin-bottom:3px}.scd .sv{font-weight:700;font-size:1rem;font-family:'JetBrains Mono',monospace}.scd .sl{font-size:.58rem;color:var(--ink3);margin-top:2px}
.jpv{margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border)}.jpv:last-child{border:none;margin:0;padding:0}
.jdt{font-size:.62rem;color:var(--gold);font-family:'JetBrains Mono',monospace;margin-bottom:2px}
.jtx{font-size:.78rem;color:var(--ink);line-height:1.5;font-family:'Crimson Pro',serif}
.empty{text-align:center;padding:28px;color:var(--ink3);font-size:.82rem}
.exs{text-align:center;padding:14px}
.exb{background:0;border:1px solid var(--border);color:var(--ink2);padding:7px 14px;border-radius:6px;font-size:.72rem;margin:3px;min-height:36px}
.toast{position:fixed;bottom:calc(18px + var(--sb));left:50%;transform:translateX(-50%);background:#0f0f0f;color:var(--gold-l);padding:8px 18px;border-radius:8px;font-size:.76rem;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
@media(min-width:700px){.scr{max-width:640px;margin:0 auto;padding:20px 20px calc(20px + var(--sb))}}
</style>
</head>
<body>
<div class="hdr"><div><h1>Daily OS</h1><span class="sub">CTO Playbook · FY27</span></div><div class="hdr-r"><span class="badge" id="stk" style="display:none">🔥 0d</span><button class="syncb" onclick="doSync()">⇧ Sync</button></div></div>
<div class="dnav"><button onclick="nav(-1)" id="pBtn">◀</button><div class="dc"><div class="dname" id="dn"></div><div class="ddate" id="dd"></div></div><button onclick="nav(1)" id="nBtn">▶</button><button class="todayb" id="tBtn" onclick="goT()" style="display:none">Today</button></div>
<div class="tabs">
<button class="tab on" data-t="today" onclick="sw('today')"><span class="ti">📋</span>Today</button>
<button class="tab" data-t="journal" onclick="sw('journal')"><span class="ti">📝</span>Journal</button>
<button class="tab" data-t="tasks" onclick="sw('tasks')"><span class="ti">✅</span>Tasks</button>
<button class="tab" data-t="insights" onclick="sw('insights')"><span class="ti">📊</span>Insights</button>
</div>
<div class="scr" id="scr"></div>
<div class="toast" id="tst"></div>
<script>
// ═══ DB ═══
const DB='LakshmanDailyOS',VER=4,ST='days';let db=null,D={};
function odb(){return new Promise(r=>{const q=indexedDB.open(DB,VER);q.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains(ST))d.createObjectStore(ST)};q.onsuccess=e=>{db=e.target.result;r()};q.onerror=()=>r()})}
function iset(k,v){if(!db){localStorage.setItem('d_'+k,JSON.stringify(v));return}const t=db.transaction(ST,'readwrite');t.objectStore(ST).put(v,k)}
function iall(){if(!db){const r={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith('d_'))try{r[k.slice(2)]=JSON.parse(localStorage.getItem(k))}catch{}}return Promise.resolve(r)}return new Promise(r=>{const o={};const t=db.transaction(ST,'readonly').objectStore(ST).openCursor();t.onsuccess=e=>{const c=e.target.result;if(c){o[c.key]=c.value;c.continue()}else r(o)};t.onerror=()=>r(o)})}

// ═══ DATA ═══
const ROUTINE=[
{id:'walk',t:'5:00–5:45',l:'Walk Chase',i:'🐕',c:'m',p:10},{id:'yoga',t:'5:45–6:30',l:'Pranayama & Yoga',i:'🧘',c:'m',p:15},
{id:'family_am',t:'6:30–7:15',l:'Family / Daughter Ready',i:'👨‍👧',c:'m',p:10},{id:'read_am',t:'7:15–7:50',l:'Reading / School Drop',i:'📖',c:'m',p:8},
{id:'commute',t:'8:15–8:45',l:'Commute — 3 Priorities',i:'🎯',c:'m',p:12},
{id:'family_pm',t:'7:00–10:00',l:'Family Time & Dinner',i:'🏠',c:'e',p:10},
{id:'read_pm',t:'10:00–11:00',l:'Night Reading',i:'📚',c:'e',p:10},{id:'sleep',t:'11:00',l:'Lights Out by 11',i:'🌙',c:'e',p:8}
];

const PB={
Monday:[
{id:'m1',t:'9:00–9:30',l:'PMO Standup (Ajay)',i:'📊',p:10,v:0,ph:'Red items, owners assigned'},
{id:'m2',t:'9:30–9:45',l:'Landing Ritual',i:'☕',p:8,v:0,ph:''},
{id:'m3',t:'10:00–10:45',l:'BH 1:1 — Slot 1',i:'🤝',p:12,v:1,ph:'Who? Discussion & outcome'},
{id:'m4',t:'11:00–11:45',l:'BH 1:1 — Slot 2',i:'🤝',p:12,v:1,ph:'Who? Discussion & outcome'},
{id:'m5',t:'12:00–12:45',l:'BH 1:1 — Slot 3 (optional)',i:'🤝',p:8,v:1,ph:'Who? Or skipped this week'},
{id:'m6',t:'1:00–1:45',l:'Lunch + Human Connection',i:'🍽️',p:5,v:0,ph:''},
{id:'m7',t:'2:00–4:00',l:'Vendor / External Calls',i:'📞',p:10,v:1,ph:'Bonbloc/Relyon/E2E — topics'},
{id:'m8',t:'4:00–5:30',l:'Deep Work / Follow-ups',i:'⚡',p:10,v:1,ph:'What did you work on?'},
{id:'m9',t:'5:30–6:00',l:'EOD Review & Tomorrow Prep',i:'📋',p:8,v:0,ph:''}
],
Tuesday:[
{id:'t1',t:'9:00',l:'Builder Mode ON — No Meetings',i:'🔬',p:8,v:0,ph:''},
{id:'t2',t:'9:00–5:00',l:'🔬 BUILDER DAY',i:'⚡',p:25,v:1,ph:'What did you build? Code, arch, AI...'},
{id:'t3',t:'5:00–5:30',l:'Builder Log — What shipped?',i:'📋',p:10,v:1,ph:'What advances tomorrow?'}
],
Wednesday:[
{id:'w1',t:'9:00',l:'Landing Ritual',i:'☕',p:8,v:0,ph:''},
{id:'w2',t:'9:00–10:00',l:'Security Review (Sumit)',i:'🔒',p:12,v:1,ph:'SIEM, DPDP, vendor audit...'},
{id:'w3',t:'10:30–12:00',l:'Pillar B Review (Sam)',i:'📈',p:12,v:1,ph:'Optimize+Unify, blockers...'},
{id:'w4',t:'1:00–1:45',l:'Lunch',i:'🍽️',p:5,v:0,ph:''},

function sc(d,w){if(!d)return 0;let s=0;ROUTINE.forEach(r=>{if(d.r?.[r.id])s+=r.p});HABITS.forEach(h=>{if(d.h?.[h.id])s+=h.p});if(d.j?.trim())s+=10;if(d.pri?.filter(p=>p?.trim()).length>=3)s+=10;if(d.imp?.trim())s+=5;if(d.wins?.trim())s+=5;const hh=d.hh||{};if((hh.operator||0)+(hh.builder||0)+(hh.leader||0)>0)s+=15;s+=Object.values(d.cul||{}).filter(Boolean).length*5;(PB[w]||[]).forEach(a=>{if(d.pa?.[a.id])s+=a.p});return s}

function nudges(){const k=dk(cur),w=dow(cur),d=gd(k),s=sc(d,w),mx=maxSc(w);const yd=D[dk(new Date(cur-864e5))],yw=dow(new Date(cur-864e5)),ys=sc(yd,yw),ymx=maxSc(yw);const n=[];
if(ys>0){const tp=Math.round(s/mx*100),yp=Math.round(ys/ymx*100);if(tp>yp)n.push(`📈 ${tp}% today vs ${yp}% yesterday. Momentum.`);else if(tp===yp)n.push(`⚖️ Same ${tp}%. Push for more.`);else n.push(`📉 ${tp}% vs ${yp}% yesterday. What slipped?`)}
const pa=PB[w]||[],mp=pa.filter(a=>!d.pa?.[a.id]);if(mp.length>0&&mp.length<=4)n.push(`🎯 Pending: ${mp.map(a=>a.l.replace(/—.*$/,'').replace(/\(.*/,'')).join(', ')}`);
const mD=ROUTINE.filter(r=>r.c==='m'&&d.r?.[r.id]).length,mT=ROUTINE.filter(r=>r.c==='m').length;
if(mD===mT)n.push('🌅 Perfect morning.');else if(mD<3)n.push('⚠️ Morning block needs work.');

const hh=d.hh||{},tH=(hh.operator||0)+(hh.builder||0)+(hh.leader||0);if(tH===0&&pa.length>0)n.push('🎩 Log your Three Hats hours.');
if(!d.j?.trim())n.push('📝 No journal. 2 sentences = accountability.');
const ws=[];for(let i=0;i<7;i++){const dt=new Date(cur-i*864e5),v=scD(dt);if(v>0)ws.push({v,mx:maxSc(dow(dt))})}
if(ws.length>=3){const ap=Math.round(ws.reduce((a,x)=>a+x.v/x.mx*100,0)/ws.length);n.push(`📊 ${ws.length}-day avg: ${ap}%. ${ap>65?'Strong.':'Focus mornings first.'}`)}

const wPct=wPt>0?Math.round(wPd/wPt*100):0;
h+=`<div style="text-align:center;margin-bottom:8px"><div style="font-size:2rem;font-weight:700;font-family:'JetBrains Mono',monospace;color:${wPct>=70?'var(--green)':wPct>=40?'var(--gold)':'var(--red)'}">${wPct}%</div><div style="font-size:.68rem;color:var(--ink3)">${wPd}/${wPt} actions done</div></div>`;
['Monday','Tuesday','Wednesday','Thursday','Friday'].forEach(day=>{const pa=PB[day]||[];if(!pa.length)return;const dt=new Date(cur.getTime()-cur.getDay()*864e5+dayNames.indexOf(day)*864e5);const dd=D[dk(dt)];const done=dd?.pa?pa.filter(a=>dd.pa[a.id]).length:0;const pct=pa.length>0?done/pa.length*100:0;const isT=dow(cur)===day;
h+=`<div class="prow"><div class="plb"><span style="${isT?'font-weight:700;color:var(--gold)':''}">${isT?'▸ ':''}${day}</span><span>${done}/${pa.length}</span></div><div class="ptrk"><div class="pfill" style="width:${pct}%;background:${isT?'var(--gold)':'var(--green)'}"></div></div></div>`});
h+=`</div>`;

// Stats
const allSc=Object.entries(D).map(([k,d])=>{const dt=new Date(k+'T00:00:00');return sc(d,dow(dt))}).filter(s=>s>0);
const best=allSc.length?Math.max(...allSc):0,avg=allSc.length?Math.round(allSc.reduce((a,b)=>a+b,0)/allSc.length):0;
h+=`<div class="sgrid" style="margin-bottom:12px"><div class="scd"><div class="si">🔥</div><div class="sv">${streak()}d</div><div class="sl">Streak</div></div><div class="scd"><div class="si">🏆</div><div class="sv">${best}</div><div class="sl">Best</div></div><div class="scd"><div class="si">📅</div><div class="sv">${allSc.length}</div><div class="sl">Days</div></div><div class="scd"><div class="si">📊</div><div class="sv">${avg}</div><div class="sl">Average</div></div></div>`;

// Recent journals
h+=`<div class="cd"><div class="ch"><span class="dot" style="background:var(--gold)"></span> Recent Journals</div>`;let hJ=false;
for(let i=1;i<=5;i++){const dt=new Date(cur-i*864e5),dd=D[dk(dt)];if(dd?.j?.trim()){hJ=true;h+=`<div class="jpv"><div class="jdt">${dt.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'})} · ${sc(dd,dow(dt))}</div><div class="jtx">${E(dd.j.slice(0,180))}${dd.j.length>180?'...':''}</div></div>`}}
if(!hJ)h+='<div class="empty" style="padding:14px">No journals yet.</div>';
h+=`</div><div class="exs"><button class="exb" onclick="expJ()">📥 Export</button><button class="exb" onclick="doSync()">⇧ Claude Sync</button><button class="exb" onclick="impJ()">📤 Import</button><input type="file" id="imF" accept=".json" style="display:none" onchange="hIm(event)"></div>`;
return h;
}

// ═══ HANDLERS ═══
function tglR(id){const k=dk(cur),d=gd(k);d.r=d.r||{};d.r[id]=!d.r[id];D[k]=d;save();render()}
function tglH(id){const k=dk(cur),d=gd(k);d.h=d.h||{};d.h[id]=!d.h[id];D[k]=d;save();render()}
function tglC(id){const k=dk(cur),d=gd(k);d.cul=d.cul||{};d.cul[id]=!d.cul[id];D[k]=d;save();render()}
function tglPA(id){const k=dk(cur),d=gd(k);d.pa=d.pa||{};d.pa[id]=!d.pa[id];D[k]=d;save();render()}
function setPN(id,v){const k=dk(cur),d=gd(k);d.pn=d.pn||{};d.pn[id]=v;D[k]=d;save()}
function setPri(i,v){const k=dk(cur),d=gd(k);d.pri=d.pri||['','',''];d.pri[i]=v;D[k]=d;save()}
function adjH(id,delta){const k=dk(cur),d=gd(k);d.hh=d.hh||{operator:0,builder:0,leader:0};d.hh[id]=Math.max(0,(d.hh[id]||0)+delta);D[k]=d;save();render()}

function addT(){const inp=document.getElementById('ti');if(!inp||!inp.value.trim())return;const k=dk(cur),d=gd(k);d.tasks=d.tasks||[];d.tasks.push({id:Date.now()+'',text:inp.value.trim(),done:false,cat:tf==='all'?'work':tf});D[k]=d;save();inp.value='';render()}
function tglT(id){const k=dk(cur),d=gd(k);d.tasks=(d.tasks||[]).map(t=>t.id===id?{...t,done:!t.done}:t);D[k]=d;save();render()}
function delT(id){const k=dk(cur),d=gd(k);d.tasks=(d.tasks||[]).filter(t=>t.id!==id);D[k]=d;save();render()}
function carry(){const k=dk(cur),yk=dk(new Date(cur-864e5)),yt=(D[yk]?.tasks||[]).filter(t=>!t.done);if(!yt.length){toast('Nothing to carry');return}const d=gd(k);d.tasks=d.tasks||[];const ex=new Set(d.tasks.map(t=>t.text));let n=0;yt.forEach(t=>{if(!ex.has(t.text)){d.tasks.push({...t,id:Date.now()+''+Math.random(),done:false});n++}});D[k]=d;save();render();toast(`Carried ${n}`)}

function nav(delta){const d=new Date(cur);d.setDate(d.getDate()+delta);if(d<=new Date()){cur=d;render()}}
function goT(){cur=new Date();render()}
function sw(t){tab=t;document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('on',el.dataset.t===t));render()}

function expJ(){const b=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`dailyos-${tk()}.json`;a.click();toast('Exported')}
function impJ(){document.getElementById('imF').click()}
async function hIm(e){const f=e.target.files[0];if(!f)return;try{const t=await f.text();const data=JSON.parse(t);for(const[k,v]of Object.entries(data)){D[k]=v;iset(k,v)}render();toast(`Imported ${Object.keys(data).length} days`)}catch{toast('Failed')}e.target.value=''}
async function doSync(){const r={};for(let i=0;i<30;i++){const d=new Date();d.setDate(d.getDate()-i);const k=dk(d),w=dow(d);if(D[k]&&sc(D[k],w)>0)r[k]=D[k]}try{await navigator.clipboard.writeText(JSON.stringify(r,null,2));toast('30 days copied — paste in Claude')}catch{const ta=document.createElement('textarea');ta.value=JSON.stringify(r,null,2);document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('Copied')}}

let ttm;function toast(m){const el=document.getElementById('tst');el.textContent=m;el.classList.add('show');if(ttm)clearTimeout(ttm);ttm=setTimeout(()=>el.classList.remove('show'),2000)}

async function init(){await odb();D=await iall();render()}
init();
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
