<script>

// ═══ DB ═══
const DB='LakshmanDailyOS',VER=6,ST='days';let db=null,D={},G={books:[]};
function odb(){return new Promise(r=>{const q=indexedDB.open(DB,VER);q.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains(ST))d.createObjectStore(ST);if(!d.objectStoreNames.contains('meta'))d.createObjectStore('meta');if(!d.objectStoreNames.contains('global'))d.createObjectStore('global')};q.onsuccess=e=>{db=e.target.result;r()};q.onerror=()=>r()})}
function iset(k,v){if(!db){localStorage.setItem('d_'+k,JSON.stringify(v));return}try{db.transaction(ST,'readwrite').objectStore(ST).put(v,k)}catch{localStorage.setItem('d_'+k,JSON.stringify(v))}}
function iall(){if(!db){const r={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith('d_'))try{r[k.slice(2)]=JSON.parse(localStorage.getItem(k))}catch{}}return Promise.resolve(r)}return new Promise(r=>{const o={};const t=db.transaction(ST,'readonly').objectStore(ST).openCursor();t.onsuccess=e=>{const c=e.target.result;if(c){o[c.key]=c.value;c.continue()}else r(o)};t.onerror=()=>r(o)})}
function mset(k,v){if(!db){localStorage.setItem('m_'+k,v);return}try{db.transaction('meta','readwrite').objectStore('meta').put(v,k)}catch{localStorage.setItem('m_'+k,v)}}
function mget(k){if(!db)return Promise.resolve(localStorage.getItem('m_'+k));return new Promise(r=>{try{const q=db.transaction('meta','readonly').objectStore('meta').get(k);q.onsuccess=()=>r(q.result||null);q.onerror=()=>r(null)}catch{r(localStorage.getItem('m_'+k))}})}
function gset(k,v){if(!db){localStorage.setItem('g_'+k,JSON.stringify(v));return}try{db.transaction('global','readwrite').objectStore('global').put(v,k)}catch{localStorage.setItem('g_'+k,JSON.stringify(v))}}
function gget(k){if(!db){try{return Promise.resolve(JSON.parse(localStorage.getItem('g_'+k)))}catch{return Promise.resolve(null)}}return new Promise(r=>{try{const q=db.transaction('global','readonly').objectStore('global').get(k);q.onsuccess=()=>r(q.result||null);q.onerror=()=>r(null)}catch{r(null)}})}

async function pullCloud(){if(!SYNC.token||!SYNC.gistId||SYNC.syncing)return;SYNC.syncing=true;updSyncUI();try{const r=await fetch('https://api.github.com/gists/'+SYNC.gistId,{headers:{'Authorization':'token '+SYNC.token}});if(!r.ok)throw new Error();const g=await r.json();const f=g.files['dailyos-data.json'];if(!f)throw new Error();const cloud=JSON.parse(f.content);const cDays=cloud.days||cloud;let ch=false;

let lo=false;Object.keys(D).forEach(k=>{if(!cDays[k])lo=true});if(lo)await pushCloud();
if(ch)render();SYNC.lastSync=Date.now()}catch(e){console.error(e)}SYNC.syncing=false;updSyncUI()}

  (d.pri||[]).forEach((p,i)=>{if(p?.trim()&&!d.pa?.['pri_done_'+i])inc.push({id:'pri_'+i,label:'Priority '+(i+1)+': '+p,type:'priority'})});
  (PB[w]||[]).forEach(a=>{if(!d.pa?.[a.id])inc.push({id:'pb_'+a.id,label:a.l,type:'playbook'})});
  ROUTINE.forEach(r=>{if(!d.r?.[r.id])inc.push({id:'rt_'+r.id,label:r.l,type:'routine'})});
  return inc;
}

dn2.slice(1).concat(['Sunday']).forEach(day=>{const pa=PB[day]||[];if(!pa.length)return;const dt=new Date(cur.getTime()-cur.getDay()*864e5+dn2.indexOf(day)*864e5),dd=D[dk(dt)],done=dd?.pa?pa.filter(a=>dd.pa[a.id]).length:0,pct=pa.length>0?done/pa.length*100:0,isT=dow(cur)===day;h+='<div class="prow"><div class="plb"><span style="'+(isT?'font-weight:700;color:var(--gold)':'')+'">'+(isT?'▸ ':'')+day+'</span><span>'+done+'/'+pa.length+'</span></div><div class="ptrk"><div class="pfill" style="width:'+pct+'%;background:'+(isT?'var(--gold)':'var(--green)')+'"></div></div></div>'});h+='</div>';

const allSc=Object.entries(D).map(([k,d])=>{const dt=new Date(k+'T00:00:00');return sc(d,dow(dt))}).filter(s=>s>0);const best=allSc.length?Math.max(...allSc):0,avg=allSc.length?Math.round(allSc.reduce((a,b)=>a+b,0)/allSc.length):0;
h+='<div class="sgrid" style="margin-bottom:12px"><div class="scd"><div class="si">🔥</div><div class="sv">'+streak()+'d</div><div class="sl">Streak</div></div><div class="scd"><div class="si">🏆</div><div class="sv">'+best+'</div><div class="sl">Best</div></div><div class="scd"><div class="si">📅</div><div class="sv">'+allSc.length+'</div><div class="sl">Days</div></div><div class="scd"><div class="si">📊</div><div class="sv">'+avg+'</div><div class="sl">Average</div></div></div>';
// Reading stats
const activeBooks=G.books.filter(b=>b.status==='reading').length;const doneBooks=G.books.filter(b=>b.status==='done').length;const totalPages=G.books.filter(b=>b.status!=='dropped').reduce((a,b)=>a+b.pagesRead,0);
h+='<div class="cd"><div class="ch"><span class="dot" style="background:var(--gold)"></span> Reading Stats</div><div style="display:flex;gap:16px;justify-content:center;font-size:.78rem;text-align:center"><div><div style="font-size:1.1rem;font-weight:700">'+activeBooks+'</div><div style="font-size:.6rem;color:var(--ink3)">Reading</div></div><div><div style="font-size:1.1rem;font-weight:700">'+doneBooks+'</div><div style="font-size:.6rem;color:var(--ink3)">Completed</div></div><div><div style="font-size:1.1rem;font-weight:700">'+totalPages+'</div><div style="font-size:.6rem;color:var(--ink3)">Pages Read</div></div></div></div>';
h+='<div class="exs"><button class="exb" onclick="expJ()">📥 Export</button><button class="exb" onclick="doSync()">⇧ Claude</button><button class="exb" onclick="impJ()">📤 Import</button><button class="exb" onclick="showSetup()">☁️ Sync</button><input type="file" id="imF" accept=".json" style="display:none" onchange="hIm(event)"></div>';
return h;}

// ═══ HANDLERS ═══
function tglR(id){const k=dk(cur),d=gd(k);d.r=d.r||{};d.r[id]=!d.r[id];D[k]=d;save();render()}
function tglH(id){const k=dk(cur),d=gd(k);d.h=d.h||{};d.h[id]=!d.h[id];D[k]=d;save();render()}
function tglC(id){const k=dk(cur),d=gd(k);d.cul=d.cul||{};d.cul[id]=!d.cul[id];D[k]=d;save();render()}
function tglPA(id){const k=dk(cur),d=gd(k);d.pa=d.pa||{};d.pa[id]=!d.pa[id];D[k]=d;save();render()}
function setPN(id,v){const k=dk(cur),d=gd(k);d.pn=d.pn||{};d.pn[id]=v;D[k]=d;save()}
function setPri(i,v){const k=dk(cur),d=gd(k);d.pri=d.pri||['','',''];d.pri[i]=v;D[k]=d;save()}
function setRef(id,v){const k=dk(cur),d=gd(k);d.ref=d.ref||{};d.ref[id]=v;D[k]=d;save()}
function adjH(id,delta){const k=dk(cur),d=gd(k);d.hh=d.hh||{operator:0,builder:0,leader:0};d.hh[id]=Math.max(0,(d.hh[id]||0)+delta);D[k]=d;save();render()}
function addT(){const inp=document.getElementById('ti');if(!inp||!inp.value.trim())return;const k=dk(cur),d=gd(k);d.tasks=d.tasks||[];d.tasks.push({id:Date.now()+'',text:inp.value.trim(),done:false,cat:tf==='all'?'work':tf});D[k]=d;save();inp.value='';render()}
function tglT(id){const k=dk(cur),d=gd(k);d.tasks=(d.tasks||[]).map(t=>t.id===id?{...t,done:!t.done}:t);D[k]=d;save();render()}
function delT(id){const k=dk(cur),d=gd(k);d.tasks=(d.tasks||[]).filter(t=>t.id!==id);D[k]=d;save();render()}
function carry(){const k=dk(cur),yk=dk(new Date(cur-864e5)),yt=(D[yk]?.tasks||[]).filter(t=>!t.done);if(!yt.length){toast('Nothing');return}const d=gd(k);d.tasks=d.tasks||[];const ex=new Set(d.tasks.map(t=>t.text));let n=0;yt.forEach(t=>{if(!ex.has(t.text)){d.tasks.push({...t,id:Date.now()+''+Math.random(),done:false});n++}});D[k]=d;save();render();toast('Carried '+n)}
// Book handlers
function addBook(){const t=document.getElementById('bkTitle')?.value?.trim();const a=document.getElementById('bkAuthor')?.value?.trim();const p=parseInt(document.getElementById('bkPages')?.value)||0;if(!t)return toast('Enter title');G.books.push({title:t,author:a||'Unknown',totalPages:p,pagesRead:0,status:'reading',startDate:dk(new Date()),endDate:null,summary:''});saveG();render();toast('Book added')}
function updPages(idx,delta){if(!G.books[idx])return;G.books[idx].pagesRead=Math.max(0,Math.min(G.books[idx].totalPages,G.books[idx].pagesRead+delta));saveG();render()}
function finishBook(idx){if(!G.books[idx])return;G.books[idx].status='done';G.books[idx].pagesRead=G.books[idx].totalPages;G.books[idx].endDate=dk(new Date());saveG();render();toast('📚 Book completed!')}
function dropBook(idx){if(!G.books[idx])return;G.books[idx].status='dropped';G.books[idx].endDate=dk(new Date());saveG();render();toast('Book dropped')}
function bookSummary(idx,v){if(!G.books[idx])return;G.books[idx].summary=v;saveG()}

function nav(delta){const d=new Date(cur);d.setDate(d.getDate()+delta);if(d<=new Date()){cur=d;render()}}
function goT(){cur=new Date();render()}
function sw(t){tab=t;document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('on',el.dataset.t===t));render()}
function expJ(){const payload={days:D,global:G};const b=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='dailyos-'+tk()+'.json';a.click();toast('Exported')}
function impJ(){document.getElementById('imF').click()}
async function hIm(e){const f=e.target.files[0];if(!f)return;try{const t=await f.text();const data=JSON.parse(t);const days=data.days||data;for(const[k,v]of Object.entries(days)){D[k]=v;iset(k,v)}if(data.global){G=data.global;gset('global',G)}render();toast('Imported')}catch{toast('Failed')}e.target.value=''}
async function doSync(){const payload={days:{},global:G};for(let i=0;i<30;i++){const d=new Date();d.setDate(d.getDate()-i);const k=dk(d),w=dow(d);if(D[k]&&sc(D[k],w)>0)payload.days[k]=D[k]}try{await navigator.clipboard.writeText(JSON.stringify(payload,null,2));toast('30 days copied')}catch{const ta=document.createElement('textarea');ta.value=JSON.stringify(payload,null,2);document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('Copied')}}
let ttm;function toast(m){const el=document.getElementById('tst');el.textContent=m;el.classList.add('show');if(ttm)clearTimeout(ttm);ttm=setTimeout(()=>el.classList.remove('show'),2000)}
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&SYNC.token)pullCloud()});
async function init(){await odb();D=await iall();const gl=await gget('global');if(gl)G=gl;render();await loadSyncCfg()}
init();
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
